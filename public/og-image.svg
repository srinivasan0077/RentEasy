<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle pattern circles -->
  <circle cx="100" cy="500" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="130" r="250" fill="rgba(255,255,255,0.04)"/>
  <circle cx="600" cy="600" r="300" fill="rgba(255,255,255,0.02)"/>
  
  <!-- Logo icon -->
  <rect x="80" y="70" width="52" height="52" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="106" y="104" font-family="Arial, sans-serif" font-size="26" fill="white" text-anchor="middle">🏠</text>
  
  <!-- Logo text -->
  <text x="146" y="105" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="white" letter-spacing="-0.5">RentEasy</text>
  
  <!-- Main headline -->
  <text x="80" y="230" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="900" fill="white" letter-spacing="-1.5">
    Rent Receipts, Agreements
  </text>
  <text x="80" y="300" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="900" fill="url(#accent)" letter-spacing="-1.5">
    &amp; Payment Tracking
  </text>
  
  <!-- Subtitle -->
  <text x="80" y="370" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="rgba(255,255,255,0.85)" letter-spacing="0">
    Free tool for Indian landlords. No Excel. No paperwork.
  </text>
  
  <!-- Feature pills -->
  <rect x="80" y="430" width="220" height="44" rx="22" fill="rgba(255,255,255,0.12)"/>
  <text x="190" y="458" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="white" text-anchor="middle" font-weight="600">✓ HRA Tax Compliant</text>
  
  <rect x="320" y="430" width="260" height="44" rx="22" fill="rgba(255,255,255,0.12)"/>
  <text x="450" y="458" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="white" text-anchor="middle" font-weight="600">✓ WhatsApp Reminders</text>
  
  <rect x="600" y="430" width="200" height="44" rx="22" fill="rgba(255,255,255,0.12)"/>
  <text x="700" y="458" font-family="Arial, Helvetica, sans-serif" font-size="17" fill="white" text-anchor="middle" font-weight="600">✓ PDF Download</text>
  
  <!-- URL -->
  <rect x="80" y="520" width="280" height="46" rx="23" fill="rgba(255,255,255,0.15)"/>
  <text x="220" y="550" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="white" text-anchor="middle" font-weight="700" letter-spacing="0.5">userenteasy.in</text>
  
  <!-- Free badge -->
  <rect x="980" y="520" width="140" height="46" rx="23" fill="#fbbf24"/>
  <text x="1050" y="550" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#78350f" text-anchor="middle" font-weight="800">100% FREE</text>
</svg>
